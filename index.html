<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台電雅晴盃戰鬥陀螺邀請賽</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: #e8e8f0;
    padding: 16px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  .header { text-align: center; padding: 16px 16px 24px; }
  .cover-image-wrap {
    width: 100%;
    max-width: 520px;
    margin: 0 auto 16px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 12px 40px rgba(74, 144, 226, 0.4), 0 4px 16px rgba(0, 0, 0, 0.5);
    border: 2px solid rgba(74, 144, 226, 0.5);
    animation: coverGlow 3s ease-in-out infinite;
  }
  @keyframes coverGlow {
    0%, 100% { box-shadow: 0 12px 40px rgba(74, 144, 226, 0.4), 0 4px 16px rgba(0, 0, 0, 0.5); }
    50% { box-shadow: 0 12px 60px rgba(74, 144, 226, 0.7), 0 0 30px rgba(233, 69, 96, 0.4); }
  }
  .cover-image-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(26, 26, 46, 0.3) 100%);
    pointer-events: none;
  }
  .cover-image {
    width: 100%;
    height: auto;
    display: block;
  }
  .header-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #e94560, #ff6b9d);
    border-radius: 50%; margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(233, 69, 96, 0.4);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .header-icon svg { width: 40px; height: 40px; color: white; }
  h1 {
    font-size: 32px; font-weight: 700;
    background: linear-gradient(135deg, #e94560, #ffd460);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 6px; letter-spacing: 1px;
  }
  .subtitle { color: #8a8aa8; font-size: 14px; letter-spacing: 2px; }
  
  .card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px; padding: 20px; margin-bottom: 16px;
  }
  .card-label {
    font-size: 12px; color: #8a8aa8;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 12px; font-weight: 600;
  }
  
  .format-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .format-btn {
    padding: 16px 12px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #c0c0d0; cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    text-align: left;
  }
  .format-btn:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
  .format-btn.active {
    background: linear-gradient(135deg, rgba(233, 69, 96, 0.25), rgba(255, 107, 157, 0.15));
    border-color: #e94560;
    color: #fff;
    box-shadow: 0 4px 16px rgba(233, 69, 96, 0.3);
  }
  .format-icon { font-size: 22px; margin-bottom: 6px; }
  .format-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .format-desc { font-size: 11px; color: #8a8aa8; line-height: 1.5; }
  .format-btn.active .format-desc { color: #c0c0d0; }
  
  .count-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .count-btn {
    padding: 12px 8px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px; color: #e8e8f0;
    font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .count-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
  .count-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .count-btn.active {
    background: linear-gradient(135deg, #e94560, #ff6b9d);
    border-color: transparent;
    box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
  }
  
  .config-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0;
  }
  .config-label { font-size: 14px; color: #c0c0d0; }
  
  .group-options { display: flex; gap: 6px; }
  .group-opt {
    padding: 6px 14px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px; color: #c0c0d0;
    font-size: 13px; cursor: pointer;
    font-family: inherit;
  }
  .group-opt.active {
    background: linear-gradient(135deg, #4a90e2, #7c5fdc);
    border-color: transparent; color: white;
  }
  
  .player-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .player-num {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #4a90e2, #7c5fdc);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  
  /* Setup avatar upload */
  .setup-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border: 2px dashed rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    transition: border-color 0.2s, background 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .setup-avatar:hover { border-color: #e94560; background: rgba(233, 69, 96, 0.1); }
  .setup-avatar.has-photo { border-color: #4a90e2; border-style: solid; }
  .setup-avatar img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: none;
  }
  .setup-avatar.has-photo img { display: block; }
  .setup-avatar-icon {
    color: #5a5a78;
    pointer-events: none;
    transition: color 0.2s;
  }
  .setup-avatar:hover .setup-avatar-icon { color: #e94560; }
  .setup-avatar.has-photo .setup-avatar-icon { display: none; }
  .setup-avatar-overlay {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    color: white;
  }
  .setup-avatar.has-photo:hover .setup-avatar-overlay { display: flex; }
  .player-input {
    flex: 1; padding: 10px 14px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px; color: #e8e8f0;
    font-size: 14px; font-family: inherit;
    transition: all 0.2s;
  }
  .player-input:focus {
    outline: none; border-color: #e94560;
    background: rgba(255, 255, 255, 0.08);
  }
  .player-input::placeholder { color: #5a5a78; }
  
  .info-banner {
    background: rgba(74, 144, 226, 0.15);
    border: 1px solid rgba(74, 144, 226, 0.3);
    color: #a8c8f0; padding: 12px 16px;
    border-radius: 10px; font-size: 13px;
    margin-bottom: 16px; display: flex;
    align-items: flex-start; gap: 8px;
    line-height: 1.6;
  }
  
  .btn-primary {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #e94560, #ff6b9d);
    border: none; border-radius: 12px;
    color: white; font-size: 16px; font-weight: 700;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 8px 24px rgba(233, 69, 96, 0.3);
    transition: all 0.2s; font-family: inherit;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(233, 69, 96, 0.5); }
  .btn-primary:active { transform: translateY(0); }
  
  .btn-secondary {
    padding: 8px 14px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px; color: #c0c0d0;
    font-size: 13px; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
  
  .btn-knockout {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #ffd460, #ff9c40);
    border: none; border-radius: 12px;
    color: #1a1a2e; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 6px 20px rgba(255, 212, 96, 0.3);
    transition: all 0.2s; font-family: inherit;
    margin: 16px 0;
  }
  .btn-knockout:hover { transform: translateY(-2px); }
  
  .draw-screen { text-align: center; padding: 80px 16px; }
  .draw-spinner { width: 120px; height: 120px; margin: 0 auto 24px; position: relative; }
  .draw-spinner::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from 0deg, #e94560, #ffd460, #4a90e2, #7c5fdc, #e94560);
    animation: spin 0.5s linear infinite; filter: blur(2px);
  }
  .draw-spinner::after {
    content: ''; position: absolute; inset: 12px;
    border-radius: 50%; background: #1a1a2e;
  }
  .draw-icon {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 2; animation: spin 0.3s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  /* === Victory Effects === */
  .victory-overlay {
    position: fixed; inset: 0; z-index: 9999;
    pointer-events: none;
    display: flex; align-items: stretch; justify-content: center;
    overflow: hidden;
    background: #000;
  }
  .victory-overlay.show { pointer-events: auto; }

  /* 海報區：左側全版 */
  .victory-poster {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 0;
    overflow: hidden;
  }
  .victory-poster img {
    height: 100%; width: auto;
    max-width: none;
    object-fit: cover;
    display: block;
    animation: posterZoom 12s ease-in-out infinite alternate;
  }
  @keyframes posterZoom {
    0%   { transform: scale(1.0); }
    100% { transform: scale(1.08); }
  }
  /* 海報上疊一層深色漸層，讓文字清晰 */
  .victory-poster::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      135deg,
      rgba(0,0,0,0.55) 0%,
      rgba(10,10,30,0.7) 60%,
      rgba(0,0,0,0.82) 100%
    );
  }

  /* 光芒射線 */
  .victory-rays {
    position: absolute; top: 50%; left: 50%;
    width: 200vmax; height: 200vmax;
    transform: translate(-50%, -50%);
    background: conic-gradient(
      from 0deg,
      transparent 0deg, rgba(255, 212, 96, 0.18) 5deg, transparent 10deg,
      transparent 30deg, rgba(255, 212, 96, 0.18) 35deg, transparent 40deg,
      transparent 60deg, rgba(255, 212, 96, 0.18) 65deg, transparent 70deg,
      transparent 90deg, rgba(255, 212, 96, 0.18) 95deg, transparent 100deg,
      transparent 120deg, rgba(255, 212, 96, 0.18) 125deg, transparent 130deg,
      transparent 150deg, rgba(255, 212, 96, 0.18) 155deg, transparent 160deg,
      transparent 180deg, rgba(255, 212, 96, 0.18) 185deg, transparent 190deg,
      transparent 210deg, rgba(255, 212, 96, 0.18) 215deg, transparent 220deg,
      transparent 240deg, rgba(255, 212, 96, 0.18) 245deg, transparent 250deg,
      transparent 270deg, rgba(255, 212, 96, 0.18) 275deg, transparent 280deg,
      transparent 300deg, rgba(255, 212, 96, 0.18) 305deg, transparent 310deg,
      transparent 330deg, rgba(255, 212, 96, 0.18) 335deg, transparent 340deg
    );
    animation: rayspin 10s linear infinite;
    z-index: 1; pointer-events: none;
  }
  @keyframes rayspin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  /* 前景主內容 */
  .victory-content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 32px 24px 80px;
    width: 100%; max-width: 480px;
    margin: auto;
    animation: victoryPop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes victoryPop {
    0% { transform: scale(0.6) translateY(40px); opacity: 0; }
    70% { transform: scale(1.05) translateY(-6px); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .victory-title {
    font-size: 88px;
    font-weight: 900;
    letter-spacing: 8px;
    background: linear-gradient(135deg, #ffd460, #ff6b9d, #ffd460);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmerText 2s ease-in-out infinite;
    line-height: 1; margin-bottom: 0;
    /* 強描邊讓文字在海報上清晰 */
    filter: drop-shadow(0 0 12px rgba(255,212,96,0.9)) drop-shadow(0 4px 16px rgba(0,0,0,0.8));
  }
  @keyframes shimmerText {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .victory-subtitle {
    font-size: 18px; color: #ffd460;
    letter-spacing: 6px; margin-top: 10px;
    font-weight: 600;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8), 0 0 20px rgba(255,212,96,0.6);
  }

  /* 冠軍照片 / SVG 角色 */
  .victory-character {
    width: 180px; height: 180px;
    margin: 24px auto 16px;
    position: relative;
    animation: charEntry 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 0 30px rgba(255, 212, 96, 0.7)) drop-shadow(0 0 60px rgba(255, 107, 157, 0.4));
  }
  @keyframes charEntry {
    0% { transform: scale(0) translateY(40px); opacity: 0; }
    60% { transform: scale(1.1) translateY(-10px); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  .victory-character svg { width: 100%; height: 100%; animation: charFloat 2.5s ease-in-out infinite; }
  .victory-character.photo-mode {
    border-radius: 50%; overflow: hidden;
    border: 6px solid #ffd460;
    box-shadow: 0 0 0 4px rgba(255,212,96,0.3), 0 0 60px rgba(255,212,96,0.8), 0 0 120px rgba(233,69,96,0.5);
    filter: none;
  }
  .victory-character.photo-mode img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    animation: charFloat 2.5s ease-in-out infinite;
  }

  /* 陀螺旋轉 icon */
  .victory-spinner {
    width: 70px; height: 70px;
    margin: 0 auto 12px;
    animation: spinFast 0.6s linear infinite;
  }
  @keyframes spinFast { to { transform: rotate(720deg); } }
  .victory-spinner svg { width: 100%; height: 100%; filter: drop-shadow(0 0 16px #ffd460); }

  .victory-trophy {
    font-size: 72px; margin-bottom: 4px;
    display: inline-block;
    animation: trophyBounce 1s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,212,96,0.9));
  }

  .victory-winner {
    font-size: 52px; font-weight: 800; color: #fff;
    margin-top: 8px;
    text-shadow: 0 0 40px rgba(255,212,96,1), 0 4px 24px rgba(0,0,0,0.9);
    letter-spacing: 2px;
    animation: winnerGlow 1.5s ease-in-out infinite;
  }
  @keyframes winnerGlow {
    0%, 100% { text-shadow: 0 0 30px rgba(255,212,96,0.9), 0 4px 24px rgba(0,0,0,0.9); }
    50% { text-shadow: 0 0 60px rgba(255,212,96,1), 0 0 100px rgba(255,107,157,0.7), 0 4px 24px rgba(0,0,0,0.9); }
  }

  .victory-loser {
    font-size: 15px; color: rgba(255,255,255,0.55);
    margin-top: 12px; letter-spacing: 1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  .victory-loser strong { color: rgba(255,255,255,0.75); }

  /* 關閉按鈕 */
  .victory-close-btn {
    position: absolute;
    bottom: 36px; left: 50%;
    transform: translateX(-50%);
    padding: 14px 40px;
    background: linear-gradient(135deg, #ffd460, #ff9c40);
    border: none; border-radius: 50px;
    color: #1a1a2e; font-size: 16px; font-weight: 900;
    letter-spacing: 3px; cursor: pointer;
    font-family: inherit; z-index: 3;
    box-shadow: 0 6px 24px rgba(255,212,96,0.5), 0 2px 8px rgba(0,0,0,0.5);
    animation: btnPulse 1.8s ease-in-out infinite;
    white-space: nowrap;
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 6px 24px rgba(255,212,96,0.5), 0 2px 8px rgba(0,0,0,0.5); transform: translateX(-50%) scale(1); }
    50% { box-shadow: 0 8px 36px rgba(255,212,96,0.8), 0 2px 8px rgba(0,0,0,0.5); transform: translateX(-50%) scale(1.04); }
  }
  .victory-close-btn:hover { background: linear-gradient(135deg, #ffe088, #ffb060); }
  .victory-close-btn:active { transform: translateX(-50%) scale(0.97); }

  /* ===== 冠軍頒獎畫面 ===== */
  .champion-overlay {
    position: fixed; inset: 0; z-index: 10000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
    background: #05050f;
  }
  .champion-poster-bg {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 0;
  }
  .champion-poster-bg img {
    height: 100%; width: 100%;
    object-fit: cover;
    animation: champPosterZoom 14s ease-in-out infinite alternate;
  }
  @keyframes champPosterZoom {
    0% { transform: scale(1.05); }
    100% { transform: scale(1.15); }
  }
  .champion-vignette {
    position: absolute; inset: 0; z-index: 1;
    background:
      radial-gradient(circle at 50% 42%, transparent 0%, rgba(5,5,15,0.35) 45%, rgba(5,5,15,0.88) 100%),
      linear-gradient(180deg, rgba(5,5,15,0.6) 0%, transparent 25%, transparent 60%, rgba(5,5,15,0.85) 100%);
  }

  .champion-card {
    position: relative; z-index: 6;
    text-align: center;
    padding: 0 24px;
    animation: champCardIn 1s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes champCardIn {
    0% { transform: translateY(40px) scale(0.92); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  .champion-crown {
    font-size: 72px;
    line-height: 1;
    margin-bottom: 4px;
    filter: drop-shadow(0 0 24px rgba(255,212,96,0.9));
    animation: crownFloat 2.5s ease-in-out infinite;
  }
  @keyframes crownFloat {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-10px) rotate(3deg); }
  }

  .champion-label {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 14px;
    text-indent: 14px;
    color: #ffd460;
    text-shadow: 0 0 20px rgba(255,212,96,0.8), 0 2px 8px rgba(0,0,0,0.9);
    margin-bottom: 2px;
  }
  .champion-label-zh {
    font-size: 64px;
    font-weight: 900;
    letter-spacing: 12px;
    text-indent: 12px;
    background: linear-gradient(135deg, #fff4cc, #ffd460, #ff9c40, #ffd460);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: champShimmer 3s ease-in-out infinite;
    filter: drop-shadow(0 0 16px rgba(255,212,96,0.7)) drop-shadow(0 4px 12px rgba(0,0,0,0.9));
    margin-bottom: 20px;
  }
  @keyframes champShimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .champion-photo-wrap {
    width: 160px; height: 160px;
    margin: 0 auto 18px;
    border-radius: 50%;
    overflow: hidden;
    border: 5px solid #ffd460;
    box-shadow: 0 0 0 4px rgba(255,212,96,0.25), 0 0 50px rgba(255,212,96,0.7), 0 0 100px rgba(233,69,96,0.4);
    animation: champPhotoPulse 2s ease-in-out infinite;
  }
  @keyframes champPhotoPulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(255,212,96,0.25), 0 0 50px rgba(255,212,96,0.7), 0 0 100px rgba(233,69,96,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(255,212,96,0.4), 0 0 70px rgba(255,212,96,1), 0 0 120px rgba(233,69,96,0.6); }
  }
  .champion-photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .champion-name {
    font-size: 60px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 3px;
    text-shadow: 0 0 40px rgba(255,212,96,1), 0 0 80px rgba(255,212,96,0.5), 0 4px 24px rgba(0,0,0,0.95);
    margin-bottom: 18px;
    word-break: break-word;
    animation: champNameGlow 2s ease-in-out infinite;
  }
  @keyframes champNameGlow {
    0%, 100% { text-shadow: 0 0 40px rgba(255,212,96,0.9), 0 4px 24px rgba(0,0,0,0.95); }

let fbApp = null, fbDb = null, roomRef = null;
let fbReady = false;

function initFirebase() {
  try {
    fbApp = firebase.initializeApp(FIREBASE_CONFIG);
    fbDb = firebase.database();

// 角色判斷：?host=密碼 → 主持人；?screen=1 → 投影；其餘 → 參賽者
function getRole() {
  const params = new URLSearchParams(location.search);
  if (params.get('screen') === '1') return 'screen';
  if (params.has('host')) return 'host';
  return 'player';
}
let APP_ROLE = getRole();

// 主持人密碼驗證（用 sessionStorage 記住本次）
function hostAuthed() {
  return sessionStorage.getItem('bey-host-ok') === '1';
}
function setHostAuthed() {
  sessionStorage.setItem('bey-host-ok', '1');
}

// 我這台裝置的參賽者身分
function getMyPlayerId() {
  return localStorage.getItem('bey-my-player-id');
}
function setMyPlayerId(id) {
  localStorage.setItem('bey-my-player-id', id);
}

// === Victory Effects ===
let soundEnabled = true;
try {
  const saved = localStorage.getItem('bey-sound');
  if (saved === 'false') soundEnabled = false;
} catch(e) {}

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

function playTone(freq, duration, type, volume) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume || 0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function playVictoryFanfare() {
  if (!soundEnabled) return;
  // ascending fanfare: C E G C high
  const notes = [
    [523, 0, 0.15],   // C5
    [659, 100, 0.15], // E5
    [784, 200, 0.15], // G5
    [1047, 350, 0.4], // C6 long
  ];
  notes.forEach(([f, delay, dur]) => {
    setTimeout(() => playTone(f, dur, 'triangle', 0.2), delay);
  });
  // sparkle on top
  setTimeout(() => playTone(2093, 0.3, 'sine', 0.1), 400);
}

function spawnConfetti(layer, count) {
  const colors = ['#ff6b9d', '#ffd460', '#4a90e2', '#7c5fdc', '#6dd896', '#e94560', '#fff'];
  const shapes = ['square', 'circle', 'rect'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    c.style.background = color;
    c.style.left = (Math.random() * 100) + '%';
    c.style.animationDuration = (2 + Math.random() * 2.5) + 's';
    c.style.animationDelay = (Math.random() * 0.6) + 's';
    if (shape === 'circle') c.style.borderRadius = '50%';
    else if (shape === 'rect') { c.style.width = '6px'; c.style.height = '14px'; }
    layer.appendChild(c);
  }
}

function spawnFirework(layer, x, y) {
  const colors = ['#ff6b9d', '#ffd460', '#4a90e2', '#6dd896', '#e94560', '#fff'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const particleCount = 24;
  for (let i = 0; i < particleCount; i++) {
    const angle = (i / particleCount) * Math.PI * 2;
    const dist = 80 + Math.random() * 80;
    const fx = Math.cos(angle) * dist;
    const fy = Math.sin(angle) * dist;
    const p = document.createElement('div');
    p.className = 'firework';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.background = color;
    p.style.boxShadow = `0 0 8px ${color}`;
    p.style.setProperty('--fx', fx + 'px');
    p.style.setProperty('--fy', fy + 'px');
    p.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
    layer.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
  // sound
  playTone(200 + Math.random() * 400, 0.15, 'sawtooth', 0.08);
}

// === Battle Overlay ===
let currentBattleMatchId = null;

function showBattle(matchId) {
  const found = findMatch(matchId);
  if (!found) return;
  const m = found.match;
  const p1 = getPlayer(m.p1);
  const p2 = getPlayer(m.p2);
  if (!p1 || !p2) return;
  
  currentBattleMatchId = matchId;
  
  const overlay = document.getElementById('battle-overlay');
  const name1El = document.getElementById('battle-name-1');
  const name2El = document.getElementById('battle-name-2');
  const photo1Img = document.getElementById('battle-photo-1');
  const photo2Img = document.getElementById('battle-photo-2');
  const photo1PH = document.getElementById('battle-photo-1-placeholder');
  const photo2PH = document.getElementById('battle-photo-2-placeholder');
  const stageLabel = document.getElementById('battle-stage-label');
  
  name1El.textContent = p1.name;
  name2El.textContent = p2.name;
  
  // Stage label
  let stage = 'BATTLE';
  if (m.stage === 'group') stage = `${String.fromCharCode(65 + m.groupId)} 組  ·  小組賽`;
  else if (m.stage === 'final') stage = '🏆 冠軍戰  ·  CHAMPIONSHIP';
  else if (m.stage === 'semi') stage = '準決賽  ·  SEMI-FINAL';
  else if (m.stage === 'knockout' || m.stage === 'playoff') {
    const isLast = found.roundIdx === state.knockoutRounds.length - 1;
    const lastLen = state.knockoutRounds[state.knockoutRounds.length - 1].length;
    if (isLast && lastLen === 1) stage = '🏆 冠軍戰  ·  CHAMPIONSHIP';
    else if (found.roundIdx === state.knockoutRounds.length - 2) stage = '準決賽  ·  SEMI-FINAL';
    else stage = `淘汰賽 第 ${found.roundIdx + 1} 輪`;
  }
  stageLabel.textContent = stage;
  
  // Load photos
  const photo1 = getPlayerPhoto(m.p1);
  const photo2 = getPlayerPhoto(m.p2);
  
  if (photo1) {
    photo1Img.src = photo1;
    photo1Img.style.display = 'block';
    photo1PH.style.display = 'none';
  } else {
    photo1Img.style.display = 'none';
    photo1PH.style.display = 'flex';
    photo1PH.textContent = p1.name.charAt(0).toUpperCase();
  }
  if (photo2) {
    photo2Img.src = photo2;
    photo2Img.style.display = 'block';
    photo2PH.style.display = 'none';
  } else {
    photo2Img.style.display = 'none';
    photo2PH.style.display = 'flex';
    photo2PH.textContent = p2.name.charAt(0).toUpperCase();
  }
  
  // Re-trigger animations
  const fighterLeft = document.getElementById('battle-fighter-left');
  const fighterRight = document.getElementById('battle-fighter-right');
  fighterLeft.style.animation = 'none';
  fighterRight.style.animation = 'none';
  void fighterLeft.offsetWidth;
  void fighterRight.offsetWidth;
  fighterLeft.style.animation = '';
  fighterRight.style.animation = '';
  
  overlay.classList.add('show');
  
  // Lightning + sparks effect
  setTimeout(() => spawnBattleEffects(), 600);
  
  // Battle entry sound
  playBattleSound();
}

function hideBattle() {
  const overlay = document.getElementById('battle-overlay');
  overlay.classList.remove('show');
  currentBattleMatchId = null;
}

function spawnBattleEffects() {
  const overlay = document.getElementById('battle-overlay');
  if (!overlay.classList.contains('show')) return;
  
  // Lightning bolt
  const lightning = document.createElement('div');
  lightning.className = 'battle-lightning';
  overlay.appendChild(lightning);
  setTimeout(() => lightning.remove(), 400);
  
  // Sparks bursting from VS
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 200;
    const sx = Math.cos(angle) * dist;
    const sy = Math.sin(angle) * dist;
    const spark = document.createElement('div');
    spark.className = 'battle-spark';
    spark.style.left = cx + 'px';
    spark.style.top = cy + 'px';
    spark.style.setProperty('--sx', sx + 'px');
    spark.style.setProperty('--sy', sy + 'px');
    spark.style.animationDuration = (0.6 + Math.random() * 0.6) + 's';
    overlay.appendChild(spark);
    setTimeout(() => spark.remove(), 1500);
  }
}

function playBattleSound() {
  if (!soundEnabled) return;
  // Dramatic battle entry: low boom + rising tone
  setTimeout(() => playTone(80, 0.4, 'sawtooth', 0.15), 0);
  setTimeout(() => playTone(120, 0.3, 'square', 0.08), 100);
  setTimeout(() => playTone(440, 0.15, 'triangle', 0.1), 400);
  setTimeout(() => playTone(660, 0.15, 'triangle', 0.1), 550);
  setTimeout(() => playTone(880, 0.3, 'triangle', 0.12), 700);
}

function showVictory(winnerName, loserName, isFinal, winnerId) {
  // 冠軍（決賽）走專屬頒獎畫面
  if (isFinal) {
    showChampion(winnerName, winnerId);
    return;
  }
  
  const overlay = document.getElementById('victory-overlay');
  const titleEl = document.getElementById('victory-title');
  const subtitleEl = document.getElementById('victory-subtitle');
  const winnerEl = document.getElementById('victory-winner');
  const loserEl = document.getElementById('victory-loser');
  const confettiLayer = document.getElementById('confetti-layer');
  const fireworkLayer = document.getElementById('firework-layer');
  const characterEl = document.getElementById('victory-character');
  
  // Reset layers
  confettiLayer.innerHTML = '';
  fireworkLayer.innerHTML = '';
  
  // Show winner photo if available, otherwise fall back to SVG character
  if (characterEl) {
    const photo = winnerId != null ? getPlayerPhoto(winnerId) : null;
    if (photo) {
      characterEl.className = 'victory-character photo-mode';
      characterEl.innerHTML = `<img src="${photo}" alt="${winnerName}" />`;
    } else {
      characterEl.className = 'victory-character';
      characterEl.innerHTML = getRandomVictoryCharacter();
    }
  }
  
  if (isFinal) {
    titleEl.textContent = 'CHAMPION';
    subtitleEl.textContent = '👑  全場冠軍誕生  👑';
  } else {
    titleEl.textContent = 'VICTORY';
    subtitleEl.textContent = '勝利者誕生';
  }
  winnerEl.textContent = winnerName;
  loserEl.innerHTML = loserName ? `擊敗 <strong>${loserName}</strong>` : '';
  
  overlay.style.display = 'flex';
  overlay.classList.add('show');
  
  // Spawn confetti
  spawnConfetti(confettiLayer, isFinal ? 200 : 80);
  
  // Fanfare sound
  playVictoryFanfare();
  
  // Fireworks bursts (a few rounds)
  const w = window.innerWidth;
  const h = window.innerHeight;
  const fireworkRounds = isFinal ? 8 : 4;
  for (let i = 0; i < fireworkRounds; i++) {
    setTimeout(() => {
      const x = w * (0.15 + Math.random() * 0.7);
      const y = h * (0.2 + Math.random() * 0.4);
      spawnFirework(fireworkLayer, x, y);
    }, i * 350);
  }
  
  // 繼續比賽按鈕（唯一關閉方式）
  const closeBtn = document.getElementById('victory-close-btn');
  if (closeBtn) {
    const newBtn = closeBtn.cloneNode(true); // 清除舊的監聽
    closeBtn.parentNode.replaceChild(newBtn, closeBtn);
    newBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      hideVictory();
    });
  }
}

function generateGroups(players, groupCount) {
  const shuffled = [...players].sort(() => Math.random() - 0.5);
  const groups = Array.from({length: groupCount}, (_, i) => ({
    id: i, players: [], matches: [],
  }));
  shuffled.forEach((p, idx) => {
    groups[idx % groupCount].players.push(p.id);
  });
  
  const matches = [];
  groups.forEach(g => {
    // 先列出組內所有對戰組合
    const pairings = [];
    for (let i = 0; i < g.players.length; i++) {
      for (let j = i + 1; j < g.players.length; j++) {
        pairings.push([g.players[i], g.players[j]]);
      }
    }
    
    // 用貪心法重新排序：每次挑最久沒打的玩家組合，避免連打
    const ordered = orderMatchesAvoidConsecutive(pairings);
    
    ordered.forEach(([a, b]) => {
      const m = {
        id: matches.length, stage: 'group', groupId: g.id,
        p1: a, p2: b,
        p1Score: 0, p2Score: 0, status: 'pending',
      };
      g.matches.push(m.id);
      matches.push(m);
    });
  });
  return { groups, matches };
}

// 重新排序對戰組合，盡量避免同一玩家連續上場
// 演算法：貪心法，每場挑「兩位玩家上場間隔都最大」的組合
function orderMatchesAvoidConsecutive(pairings) {
  if (pairings.length <= 1) return [...pairings];
  
  const remaining = pairings.map(p => [...p]);
  const result = [];
  // lastPlayedAt[playerId] = 上次出賽的場次索引（-Infinity 表示還沒打過）
  const lastPlayedAt = {};
  
  // 初始隨機選第一場
  const firstIdx = Math.floor(Math.random() * remaining.length);
  const first = remaining.splice(firstIdx, 1)[0];
  result.push(first);
  lastPlayedAt[first[0]] = 0;
  lastPlayedAt[first[1]] = 0;
  
  while (remaining.length > 0) {
    const curIdx = result.length;
    // 為每個剩餘的對戰組合算分：兩位玩家「上次出賽到現在的間隔」越小分數越低（越不該選）
    // 我們要選分數最高的（即兩個人都離上次出賽很久的）
    let bestScore = -Infinity;
    const candidates = [];
    
    remaining.forEach((pair, idx) => {
      const lastA = lastPlayedAt[pair[0]] !== undefined ? lastPlayedAt[pair[0]] : -999;
      const lastB = lastPlayedAt[pair[1]] !== undefined ? lastPlayedAt[pair[1]] : -999;
      const gapA = curIdx - lastA;
      const gapB = curIdx - lastB;
      // 取兩位中較小的間隔當作此對戰的「最差間隔」，再加上總間隔當次序準則
      const minGap = Math.min(gapA, gapB);
      const sumGap = gapA + gapB;
      // 主要看 minGap（越大越好，避免緊接著上場），次要看 sumGap
      const score = minGap * 1000 + sumGap;
      
      if (score > bestScore) {
        bestScore = score;
        candidates.length = 0;
        candidates.push(idx);
      } else if (score === bestScore) {
        candidates.push(idx);
      }
    });
    
    // 同分時隨機挑一個，增加變化
    const pickIdx = candidates[Math.floor(Math.random() * candidates.length)];
    const pick = remaining.splice(pickIdx, 1)[0];
    result.push(pick);
    lastPlayedAt[pick[0]] = curIdx;
    lastPlayedAt[pick[1]] = curIdx;
  }
  
  return result;
}

function generateKnockout(players) {
  const shuffled = [...players].sort(() => Math.random() - 0.5);
  const N = shuffled.length;
  if (N < 2) return [];
  
  // 找下一個 2 的次方
  let pow = 1;
  while (pow < N) pow *= 2;
  
  // 第一輪實際對戰場數 = N - pow/2
  // 例如 5 人：pow=8, 第一輪 = 5 - 4 = 1 場（4 人晉級準決賽）
  // 例如 6 人：pow=8, 第一輪 = 6 - 4 = 2 場
  // 例如 7 人：pow=8, 第一輪 = 7 - 4 = 3 場
  // 例如 8 人：pow=8, 第一輪 = 8 - 4 = 4 場（無 bye）
  // 例如 4 人：pow=4, 第一輪 = 4 - 2 = 2 場
  
  const matchIdCounter = { v: 0 };
  const rounds = [];
  
  // 如果 N 已經是 2 的次方，沒有 bye，所有人都從第一輪打起
  if (N === pow) {
    let cur = [...shuffled];
    while (cur.length > 1) {
      const ms = [];
      for (let i = 0; i < cur.length; i += 2) {
        const a = cur[i], b = cur[i + 1];
        ms.push({
          id: matchIdCounter.v++, stage: 'knockout', round: rounds.length,
          p1: a ? a.id : null, p2: b ? b.id : null,
          p1Score: 0, p2Score: 0, status: 'pending',
        });
      }
      rounds.push(ms);
      cur = ms.map(() => null); // winners filled later
    }
    return rounds;
  }
  
  // 有 bye 的情況：種子球員（前段）跳過第一輪
  const prelimMatchCount = N - pow / 2;       // 第一輪要打的場數
  const byeCount = pow / 2 - prelimMatchCount;  // 直接晉級準決賽的人數
  
  // 種子（前 byeCount 人）直接晉級
  const seeds = shuffled.slice(0, byeCount);
  // 其餘 (prelimMatchCount * 2) 人打第一輪
  const prelimPlayers = shuffled.slice(byeCount);
  
  // 第一輪
  const prelimRound = [];
  for (let i = 0; i < prelimPlayers.length; i += 2) {
    const a = prelimPlayers[i], b = prelimPlayers[i + 1];
    prelimRound.push({
      id: matchIdCounter.v++, stage: 'knockout', round: 0,
      p1: a.id, p2: b.id,
      p1Score: 0, p2Score: 0, status: 'pending',
    });
  }
  rounds.push(prelimRound);
  
  // 第二輪（準決賽 / 之後的輪）：種子先進場 + 第一輪勝者待填
  // 為了標準排法，把種子穿插在第一輪勝者中：seed1, winner1, seed2, winner2, ...
  // 但這裡簡化：seeds 排前面，winners 排後面
  const round2Slots = [];
  seeds.forEach(s => round2Slots.push({ playerId: s.id, fromMatch: null }));
  prelimRound.forEach(m => round2Slots.push({ playerId: null, fromMatch: m.id }));
  
  // 為了讓配對更平衡，把種子打散：seed[0] 對 winner[0]，seed[1] 對 winner[1]...
  // 重新排列：交替放入種子和 winners
  const interleaved = [];
  const maxLen = Math.max(seeds.length, prelimRound.length);
  for (let i = 0; i < maxLen; i++) {
    if (i < seeds.length) interleaved.push({ playerId: seeds[i].id, fromMatch: null });
    if (i < prelimRound.length) interleaved.push({ playerId: null, fromMatch: prelimRound[i].id });
  }
  
  // 建立第二輪比賽（從 interleaved 兩兩配對）
  const round2 = [];
  for (let i = 0; i < interleaved.length; i += 2) {
    const a = interleaved[i], b = interleaved[i + 1];
    round2.push({
      id: matchIdCounter.v++, stage: 'knockout', round: 1,
      p1: a.playerId, p2: b.playerId,
      fromMatch_p1: a.fromMatch, fromMatch_p2: b.fromMatch,
      p1Score: 0, p2Score: 0, status: a.playerId != null && b.playerId != null ? 'pending' : 'pending',
    });
  }
  rounds.push(round2);
  
  // 後續輪次（如果第二輪後還有人要繼續打）
  let remainingMatches = round2.length;
  let curRoundIdx = 2;
  while (remainingMatches > 1) {
    const nextRound = [];
    for (let i = 0; i < remainingMatches; i += 2) {
      nextRound.push({
        id: matchIdCounter.v++, stage: 'knockout', round: curRoundIdx,
        p1: null, p2: null,
        p1Score: 0, p2Score: 0, status: 'pending',
      });
    }
    rounds.push(nextRound);
    remainingMatches = nextRound.length;
    curRoundIdx++;
  }
  
  return rounds;
}

function getPlayer(id) {
  if (id == null) return null;
  return state.players.find(p => p.id === id);
}

function getGroupStandings(groupId) {
  const g = state.groups.find(x => x.id === groupId);
  if (!g) return [];
  const groupMatches = state.matches.filter(m => m.groupId === groupId);
  return g.players.map(pid => {
    const p = getPlayer(pid);
    let wins = 0, losses = 0, draws = 0, pf = 0, pa = 0;
    groupMatches.forEach(m => {
      if (m.status !== 'done') return;
      if (m.p1 === pid) {
        pf += m.p1Score; pa += m.p2Score;
        if (m.p1Score > m.p2Score) wins++;
        else if (m.p1Score < m.p2Score) losses++;
        else draws++;
      } else if (m.p2 === pid) {
        pf += m.p2Score; pa += m.p1Score;
        if (m.p2Score > m.p1Score) wins++;
        else if (m.p2Score < m.p1Score) losses++;
        else draws++;
      }
    });
    return {
      ...p, wins, losses, draws,
      played: wins + losses + draws,
      points: wins * 3 + draws * 1,
      pf, pa, diff: pf - pa,
    };
  }).sort((a, b) => {
    if (b.points !== a.points) return b.points - a.points;
    if (b.diff !== a.diff) return b.diff - a.diff;
    return b.pf - a.pf;
  });
}

function isGroupStageDone() {
  return state.matches.length > 0 && state.matches.every(m => m.status === 'done');
}

function buildGroupPlayoffs() {
  const qualified = state.groups.map(g => {
    const standings = getGroupStandings(g.id);
    return { groupId: g.id, first: standings[0], second: standings[1] };
  });
  
  const numGroups = qualified.length;
  
  if (numGroups === 1) {
    const standings = getGroupStandings(qualified[0].groupId);
    state.finalMatch = {
      id: 9000, stage: 'final', round: 0,
      p1: standings[0].id, p2: standings[1].id,
      p1Score: 0, p2Score: 0, status: 'pending',
      label: '冠軍戰',
    };
    state.semiMatches = [];
    state.knockoutRounds = [];
  } else if (numGroups === 2) {
    state.semiMatches = [
      {
        id: 8000, stage: 'semi', round: 0,
        p1: qualified[0].first.id, p2: qualified[1].second.id,
        p1Score: 0, p2Score: 0, status: 'pending',
        label: '準決賽 1',
      },
      {
        id: 8001, stage: 'semi', round: 0,
        p1: qualified[1].first.id, p2: qualified[0].second.id,
        p1Score: 0, p2Score: 0, status: 'pending',
        label: '準決賽 2',
      },
    ];
    state.finalMatch = {
      id: 9000, stage: 'final', round: 1,
      p1: null, p2: null,
      p1Score: 0, p2Score: 0, status: 'pending',
      label: '冠軍戰',
    };
    state.knockoutRounds = [];
  } else {
    const allQualified = [];
    qualified.forEach(q => {
      allQualified.push({ ...q.first, fromGroup: q.groupId, seed: 1 });
      allQualified.push({ ...q.second, fromGroup: q.groupId, seed: 2 });
    });
    
    // 用相同的種子邏輯產生淘汰賽
    const N = allQualified.length;
    let pow = 1;
    while (pow < N) pow *= 2;
    
    const rounds = [];
    let mid = 7000;
    
    if (N === pow) {
      // 沒有 bye
      let cur = [...allQualified];
      while (cur.length > 1) {
        const ms = [];
        for (let i = 0; i < cur.length; i += 2) {
          const a = cur[i], b = cur[i + 1];
          ms.push({
            id: mid++, stage: 'playoff', round: rounds.length,
            p1: a ? a.id : null, p2: b ? b.id : null,
            p1Score: 0, p2Score: 0, status: 'pending',
          });
        }
        rounds.push(ms);
        cur = ms.map(() => null);
      }
    } else {
      // 有 bye
      const prelimMatchCount = N - pow / 2;
      const byeCount = pow / 2 - prelimMatchCount;
      const seeds = allQualified.slice(0, byeCount);
      const prelimPlayers = allQualified.slice(byeCount);
      
      const prelimRound = [];
      for (let i = 0; i < prelimPlayers.length; i += 2) {
        const a = prelimPlayers[i], b = prelimPlayers[i + 1];
        prelimRound.push({
          id: mid++, stage: 'playoff', round: 0,
          p1: a.id, p2: b.id,
          p1Score: 0, p2Score: 0, status: 'pending',
        });
      }
      rounds.push(prelimRound);
      
      const interleaved = [];
      const maxLen = Math.max(seeds.length, prelimRound.length);
      for (let i = 0; i < maxLen; i++) {
        if (i < seeds.length) interleaved.push({ playerId: seeds[i].id, fromMatch: null });
        if (i < prelimRound.length) interleaved.push({ playerId: null, fromMatch: prelimRound[i].id });
      }
      
      const round2 = [];
      for (let i = 0; i < interleaved.length; i += 2) {
        const a = interleaved[i], b = interleaved[i + 1];
        round2.push({
          id: mid++, stage: 'playoff', round: 1,
          p1: a.playerId, p2: b.playerId,
          fromMatch_p1: a.fromMatch, fromMatch_p2: b.fromMatch,
          p1Score: 0, p2Score: 0, status: 'pending',
        });
      }
      rounds.push(round2);
      
      let remaining = round2.length;
      let curIdx = 2;
      while (remaining > 1) {
        const nextRound = [];
        for (let i = 0; i < remaining; i += 2) {
          nextRound.push({
            id: mid++, stage: 'playoff', round: curIdx,
            p1: null, p2: null,
            p1Score: 0, p2Score: 0, status: 'pending',
          });
        }
        rounds.push(nextRound);
        remaining = nextRound.length;
        curIdx++;
      }
    }
    
    state.knockoutRounds = rounds;
    state.semiMatches = [];
    state.finalMatch = null;
  }
}

function advanceKnockoutMatch(roundIdx, matchIdx, winnerId) {
  if (!state.knockoutRounds[roundIdx + 1]) return;
  const finishedMatch = state.knockoutRounds[roundIdx][matchIdx];
  const nextRound = state.knockoutRounds[roundIdx + 1];
  
  // 第一輪 → 第二輪：使用 fromMatch_p1/p2 屬性查找
  if (roundIdx === 0) {
    for (const next of nextRound) {
      if (next.fromMatch_p1 === finishedMatch.id) {
        next.p1 = winnerId;
        if (next.p1 != null && next.p2 != null) next.status = 'pending';
        return;
      }
      if (next.fromMatch_p2 === finishedMatch.id) {
        next.p2 = winnerId;
        if (next.p1 != null && next.p2 != null) next.status = 'pending';
        return;
      }
    }
  }
  
  // 第二輪以後：用標準的 i / 2 對應
  const nextIdx = Math.floor(matchIdx / 2);
  const nextMatch = nextRound[nextIdx];
  if (!nextMatch) return;
  if (matchIdx % 2 === 0) nextMatch.p1 = winnerId;
  else nextMatch.p2 = winnerId;
  if (nextMatch.p1 != null && nextMatch.p2 != null) {
    nextMatch.status = 'pending';
  }
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function scoreButtons(mid, side, current, disabled) {
  let html = '<div class="score-buttons">';
  for (let s = 0; s <= 4; s++) {
    html += `<button class="score-btn ${s === current ? 'selected' : ''}" data-mid="${mid}" data-side="${side}" data-score="${s}" ${disabled ? 'disabled' : ''}>${s}</button>`;
  }

}

function renderMatch(m, label, indexLabel) {
  const p1 = getPlayer(m.p1);
  const p2 = getPlayer(m.p2);
  const isLocked = m.p1 == null || m.p2 == null;
  const isDone = m.status === 'done';
  const isActive = m.status === 'active';
  const isFinal = m.stage === 'final' || (m.stage !== 'group' && state.knockoutRounds && state.knockoutRounds.length > 0 && m.round === state.knockoutRounds.length - 1 && state.knockoutRounds[state.knockoutRounds.length - 1].length === 1);
  
  let statusClass = 'status-pending', statusText = '待戰';
  if (isLocked && !isDone) { statusClass = 'status-locked'; statusText = '等待晉級'; }
  else if (isDone) { statusClass = 'status-done'; statusText = '完賽'; }
  else if (isActive) { statusClass = 'status-active'; statusText = '進行中'; }
  
  const p1Win = isDone && m.p1Score > m.p2Score;
  const p2Win = isDone && m.p2Score > m.p1Score;
  const isKnockoutMatch = m.stage !== 'group';
  // 淘汰賽進行中且還沒分出勝負時提示「先到 4 分」
  const showKnockoutHint = isKnockoutMatch && isActive && m.p1Score < 4 && m.p2Score < 4;
  
  const p1Class = p1Win ? 'winner' : (p2Win ? 'loser' : '');
  const p2Class = p2Win ? 'winner' : (p1Win ? 'loser' : '');
  
  const p1Name = p1 ? escapeHtml(p1.name) : '<span class="tbd">待定</span>';
  const p2Name = p2 ? escapeHtml(p2.name) : '<span class="tbd">待定</span>';
  
  // Avatar HTML helper
  const avatarHtml = (player) => {
    if (!player) return `<div class="match-avatar">?</div>`;
    const photo = getPlayerPhoto(player.id);
    if (photo) return `<div class="match-avatar"><img src="${photo}" alt="${escapeHtml(player.name)}" /></div>`;
    return `<div class="match-avatar">${escapeHtml(player.name.charAt(0).toUpperCase())}</div>`;
  };
  
  let cardClass = '';
  if (isLocked && !isDone) cardClass = '';
  else if (isFinal) cardClass = 'final';
  else if (isDone) cardClass = 'done';
  else if (isActive) cardClass = 'active';
  
  return `
    <div class="match-card ${cardClass}">
      <div class="match-header">
        <span class="match-num">${label ? `<strong>${label}</strong>` : `第 ${indexLabel} 場`}</span>
        <span class="match-status ${statusClass}">${statusText}</span>
      </div>
      
      <div class="match-vs">
        <div class="player-side left ${p1Class}">
          ${avatarHtml(p1)}
          <div class="player-name">${p1Name}</div>
          <div class="player-score">${m.p1Score}</div>
        </div>
        <div class="vs-divider">VS</div>
        <div class="player-side ${p2Class}">
          ${avatarHtml(p2)}
          <div class="player-name">${p2Name}</div>
          <div class="player-score">${m.p2Score}</div>
        </div>
      </div>
      
      ${showKnockoutHint ? '<div class="draw-tag">⚔ 淘汰賽需先到 4 分才算勝</div>' : ''}
      
      ${!isLocked && !isDone ? `<button class="battle-btn" data-mid="${m.id}">⚔ 開戰動畫</button>` : ''}
      
      <div class="score-row">
        <span class="score-label">${p1Name}</span>
        ${scoreButtons(m.id, 1, m.p1Score, isLocked)}
      </div>
      <div class="score-row">
        <span class="score-label">${p2Name}</span>
        ${scoreButtons(m.id, 2, m.p2Score, isLocked)}
      </div>
    </div>
  `;
}

    let medal = '';
    if (i === 0) medal = '🥇 ';
    else if (i === 1) medal = '🥈 ';

    const qualTag = isQualified ? '<span class="qualified-tag">晉級</span>' : '';
    
    return `
      <tr class="rank-${i + 1} ${isQualified ? 'qualified' : ''}">
        <td>${medal}${i + 1}</td>
        <td>${escapeHtml(p.name)}${qualTag}</td>

        <td class="win-num">${p.wins}</td>

function renderGroupStage() {
  const groupBlocks = state.groups.map(g => {
    const groupMatches = state.matches.filter(m => m.groupId === g.id);
    const matchesHtml = groupMatches.map((m, i) => renderMatch(m, null, i + 1)).join('');
    
    return `
      <div class="group-block">
        <div class="group-title">
          <span class="group-badge">${String.fromCharCode(65 + g.id)} 組</span>
          <span>循環賽</span>
        </div>
        ${renderGroupStandingsTable(g.id, 2)}
        <div style="margin-top: 14px;">${matchesHtml}</div>
      </div>
    `;
  }).join('');
  
  const groupDone = isGroupStageDone();
  const playoffsBuilt = state.finalMatch || state.semiMatches.length > 0 || (state.knockoutRounds && state.knockoutRounds.length > 0);
  let advanceBtn = '';
  if (groupDone && !playoffsBuilt) {
    advanceBtn = `<button class="btn-knockout" id="advance-btn">🏆 進入決賽階段</button>`;
  }
  
  return `${advanceBtn}${groupBlocks}`;
}

function renderKnockoutStage() {
  let html = '';
  
  if (state.format === 'group') {
    if (state.semiMatches.length > 0) {
      html += `<div class="bracket-round">
        <div class="round-title">準決賽</div>
        ${state.semiMatches.map(m => renderMatch(m, m.label, '')).join('')}
      </div>`;
    }
    
    if (state.knockoutRounds && state.knockoutRounds.length > 0) {
      const totalRounds = state.knockoutRounds.length;
      state.knockoutRounds.forEach((round, idx) => {
        const isLast = idx === totalRounds - 1;
        let rt = '';
        if (isLast) rt = '冠軍戰';
        else if (idx === totalRounds - 2) rt = '準決賽';
        else if (idx === totalRounds - 3) rt = '半準決賽';
        else rt = `第 ${idx + 1} 輪`;
        
        html += `<div class="bracket-round">
          <div class="round-title ${isLast ? 'final-title' : ''}">${rt}</div>
          ${round.map((m, mi) => renderMatch(m, null, `${idx + 1}-${mi + 1}`)).join('')}
        </div>`;
      });
    }
    
    if (state.finalMatch) {
      html += `<div class="bracket-round">
        <div class="round-title final-title">🏆 ${state.finalMatch.label}</div>
        ${renderMatch(state.finalMatch, state.finalMatch.label, '')}
      </div>`;
    }
  } else {
    const totalRounds = state.knockoutRounds.length;
    state.knockoutRounds.forEach((round, idx) => {
      const isLast = idx === totalRounds - 1;
      let rt = '';
      if (isLast) rt = '冠軍戰';
      else if (idx === totalRounds - 2) rt = '準決賽';
      else if (idx === totalRounds - 3) rt = '半準決賽';
      else rt = `第 ${idx + 1} 輪`;
      
      html += `<div class="bracket-round">
        <div class="round-title ${isLast ? 'final-title' : ''}">${rt}</div>
        ${round.map((m, mi) => renderMatch(m, null, `${idx + 1}-${mi + 1}`)).join('')}
      </div>`;
    });
  }
  
  return html;
}

function getChampion() {
  if (state.finalMatch && state.finalMatch.status === 'done') {
    const winnerId = state.finalMatch.p1Score > state.finalMatch.p2Score ? state.finalMatch.p1 : state.finalMatch.p2;
    return getPlayer(winnerId);
  }
  if (state.knockoutRounds && state.knockoutRounds.length > 0) {
    const lastRound = state.knockoutRounds[state.knockoutRounds.length - 1];
    if (lastRound.length === 1 && lastRound[0].status === 'done') {
      const m = lastRound[0];
      const winnerId = m.p1Score > m.p2Score ? m.p1 : m.p2;
      return getPlayer(winnerId);
    }
  }
  return null;
}

function calculateProgress() {
  let total = 0, done = 0;
  state.matches.forEach(m => { total++; if (m.status === 'done') done++; });
  state.semiMatches.forEach(m => { total++; if (m.status === 'done') done++; });
  if (state.finalMatch) { total++; if (state.finalMatch.status === 'done') done++; }
  if (state.knockoutRounds) {
    state.knockoutRounds.forEach(r => r.forEach(m => {
      // count only non-bye matches
      const isByeAuto = m.status === 'done' && m.winner != null && (m.p1 == null || m.p2 == null);
      if (!isByeAuto) {
        total++;
        if (m.status === 'done') done++;
      }
    }));
  }
  return { total, done };
}

function renderTournament() {
  const champion = getChampion();
  const { total, done } = calculateProgress();
  const progress = total > 0 ? (done / total * 100) : 0;
  
  let stageContent = '';
  if (state.format === 'group') {
    if (state.currentStage === 'group') stageContent = renderGroupStage();
    else stageContent = renderKnockoutStage();
  } else {
    stageContent = renderKnockoutStage();
  }
  
  const hasPlayoffs = state.finalMatch || state.semiMatches.length > 0 || (state.knockoutRounds && state.knockoutRounds.length > 0);
  
  let stageTabs = '';
  if (state.format === 'group') {
    stageTabs = `
      <div class="stage-tabs">
        <button class="stage-tab ${state.currentStage === 'group' ? 'active' : ''}" data-stage="group">📊 小組賽</button>
        <button class="stage-tab ${state.currentStage === 'knockout' ? 'active' : ''}" data-stage="knockout" ${!hasPlayoffs ? 'disabled' : ''}>🏆 決賽階段</button>
      </div>
    `;
  }
  
  let championBanner = '';
  if (champion) {
    championBanner = `
      <div class="champion-banner">
        <div class="champion-icon">🏆</div>
        <div class="champion-label">CHAMPION</div>
        <div class="champion-name">${escapeHtml(champion.name)}</div>
      </div>
    `;
  }
  
  const formatLabel = state.format === 'group' ? '小組賽 + 決賽' : '單淘汰賽';
  
  return `
    <div class="tournament-header">
      <div>
        <div class="tournament-title">${champion ? '🎊 對戰結束' : '⚔️ 對戰進行中'}</div>
        <div class="tournament-progress">${formatLabel} · ${done} / ${total} 場已完成</div>
      </div>
      <button class="btn-secondary" id="reset-btn">🔄 重新開始</button>
    </div>
    
    <div class="progress-bar">
      <div class="progress-fill" style="width: ${progress}%"></div>
    </div>
    
    ${championBanner}
    ${stageTabs}
    ${stageContent}
  `;
}

function render() {
  const app = document.getElementById('app');
  if (state.drawing) { app.innerHTML = renderDrawing(); return; }
  if (state.phase === 'setup') {
    app.innerHTML = renderSetup();
    attachSetupHandlers();
  } else if (state.phase === 'tournament') {
    app.innerHTML = renderTournament();
    attachTournamentHandlers();
  }
}

  const players = [];
  inputs.forEach((inp, idx) => {
    const name = inp.value.trim() || `玩家${idx + 1}`;
    players.push({ id: idx, name });
  });
  state.players = players;
}

      const f = btn.dataset.format;
      collectPlayerNames();
      state.format = f;
      if (f === 'group' && state.playerCount < 3) {
        state.playerCount = 3;
        while (state.players.length < 3) state.players.push({ id: state.players.length, name: '' });
      }

      while (state.players.length < n) state.players.push({ id: state.players.length, name: '' });
      if (state.players.length > n) state.players = state.players.slice(0, n);
      const maxGroups = Math.min(4, Math.floor(n / 2));
      if (state.groupCount > maxGroups) state.groupCount = maxGroups;
      render();
    });
  });
  
  document.querySelectorAll('.group-opt').forEach(btn => {

  });

  document.querySelectorAll('.setup-avatar').forEach(avatar => {

      fileInput.dataset.setupPidx = pidx;

      fileInput.click();
    });

  const startBtn = document.getElementById('start-btn');

function startTournament() {
  collectPlayerNames();
  if (state.players.length < 2) { alert('至少需要 2 位玩家'); return; }
  if (state.format === 'group' && state.players.length < 3) { alert('小組賽至少需要 3 位玩家'); return; }
  
  state.drawing = true;
  render();
  
  setTimeout(() => {
    if (state.format === 'group') {
      const { groups, matches } = generateGroups(state.players, state.groupCount);
      state.groups = groups;
      state.matches = matches;
      state.knockoutRounds = [];
      state.finalMatch = null;
      state.semiMatches = [];
      state.currentStage = 'group';
    } else {
      state.knockoutRounds = generateKnockout(state.players);
      state.groups = [];
      state.matches = [];
      state.finalMatch = null;
      state.semiMatches = [];
      state.currentStage = 'knockout';
    }
    state.phase = 'tournament';
    state.drawing = false;
    saveState();
    render();
  }, 1600);
}

function findMatch(mid) {
  let m = state.matches.find(x => x.id === mid);
  if (m) return { match: m, type: 'group' };
  m = state.semiMatches.find(x => x.id === mid);
  if (m) return { match: m, type: 'semi' };
  if (state.finalMatch && state.finalMatch.id === mid) return { match: state.finalMatch, type: 'final' };
  for (let r = 0; r < state.knockoutRounds.length; r++) {
    const idx = state.knockoutRounds[r].findIndex(x => x.id === mid);
    if (idx >= 0) return { match: state.knockoutRounds[r][idx], type: 'knockout', roundIdx: r, matchIdx: idx };
  }
  return null;
}

function updateMatchStatus(m, isKnockout) {
  const total = m.p1Score + m.p2Score;
  
  if (m.p1Score === 0 && m.p2Score === 0) {
    m.status = 'pending';
    return;
  }
  
  // 所有賽制：必須一方先到 4 分才算贏（小組賽也一樣）
  if (m.p1Score >= 4 || m.p2Score >= 4) {
    m.status = 'done';
  } else {
    m.status = 'active';
  }
}

function attachTournamentHandlers() {
  // Battle animation buttons
  document.querySelectorAll('.battle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const mid = parseInt(btn.dataset.mid);
      showBattle(mid);
    });
  });
  
  document.querySelectorAll('.stage-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      if (tab.disabled) return;
      state.currentStage = tab.dataset.stage;
      saveState();
      render();
    });
  });
  
  document.querySelectorAll('.score-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      const mid = parseInt(btn.dataset.mid);
      const side = parseInt(btn.dataset.side);
      const score = parseInt(btn.dataset.score);
      const found = findMatch(mid);
      if (!found) return;
      const m = found.match;
      
      const wasDone = m.status === 'done';
      const previousWinner = m.winner;
      
      if (side === 1) m.p1Score = score;
      else m.p2Score = score;
      
      const isKnockout = found.type !== 'group';
      updateMatchStatus(m, isKnockout);
      
      // Detect just-finished match (knockout or group)
      const justFinished = !wasDone && m.status === 'done';
      
      if (m.status === 'done' && isKnockout) {
        const winnerId = m.p1Score > m.p2Score ? m.p1 : m.p2;
        const loserId = m.p1Score > m.p2Score ? m.p2 : m.p1;
        m.winner = winnerId;
        
        if (found.type === 'knockout') {
          advanceKnockoutMatch(found.roundIdx, found.matchIdx, winnerId);
        } else if (found.type === 'semi') {
          const semiIdx = state.semiMatches.findIndex(x => x.id === mid);
          if (state.finalMatch) {
            if (semiIdx === 0) state.finalMatch.p1 = winnerId;
            else if (semiIdx === 1) state.finalMatch.p2 = winnerId;
          }
        }
        
        // Trigger victory effect
        if (justFinished) {
          const winner = getPlayer(winnerId);
          const loser = getPlayer(loserId);
          // Determine if this is the championship final
          let isFinal = false;
          if (found.type === 'final') isFinal = true;
          else if (found.type === 'knockout') {
            const isLastRound = found.roundIdx === state.knockoutRounds.length - 1;
            const lastRoundLen = state.knockoutRounds[state.knockoutRounds.length - 1].length;
            if (isLastRound && lastRoundLen === 1) isFinal = true;
          }
          
          // delay briefly so the score update is visible first
          setTimeout(() => {
            if (winner) showVictory(winner.name, loser ? loser.name : '', isFinal, winnerId);
          }, 200);
        }
      } else if (m.status === 'done' && !isKnockout && justFinished) {
        // 小組賽完賽也觸發勝利動畫
        const winnerId = m.p1Score > m.p2Score ? m.p1 : m.p2;
        const loserId  = m.p1Score > m.p2Score ? m.p2 : m.p1;
        const winner = getPlayer(winnerId);
        const loser  = getPlayer(loserId);
        setTimeout(() => {
          if (winner) showVictory(winner.name, loser ? loser.name : '', false, winnerId);
        }, 200);
      } else if (wasDone && m.status !== 'done' && isKnockout && previousWinner != null) {
        delete m.winner;
        if (found.type === 'knockout' && state.knockoutRounds[found.roundIdx + 1]) {
          const nextRound = state.knockoutRounds[found.roundIdx + 1];
          // 第一輪 → 第二輪：用 fromMatch_p1/p2 找
          if (found.roundIdx === 0) {
            for (const next of nextRound) {
              if (next.fromMatch_p1 === m.id) {
                next.p1 = null;
                next.p1Score = 0; next.p2Score = 0; next.status = 'pending';
                break;
              }
              if (next.fromMatch_p2 === m.id) {
                next.p2 = null;
                next.p1Score = 0; next.p2Score = 0; next.status = 'pending';
                break;
              }
            }
          } else {
            const nextMatch = nextRound[Math.floor(found.matchIdx / 2)];
            if (nextMatch) {
              if (found.matchIdx % 2 === 0) nextMatch.p1 = null;
              else nextMatch.p2 = null;
              nextMatch.p1Score = 0; nextMatch.p2Score = 0; nextMatch.status = 'pending';
            }
          }
        } else if (found.type === 'semi') {
          const semiIdx = state.semiMatches.findIndex(x => x.id === mid);
          if (state.finalMatch) {
            if (semiIdx === 0) state.finalMatch.p1 = null;
            else if (semiIdx === 1) state.finalMatch.p2 = null;
            state.finalMatch.p1Score = 0; state.finalMatch.p2Score = 0;
            state.finalMatch.status = 'pending';
          }
        }
      }
      
      // Group stage match just finished — small celebration sound
      if (!wasDone && m.status === 'done' && !isKnockout) {
        playMatchWonSound();
      }
      
      saveState();
      render();
    });
  });
  
  const advanceBtn = document.getElementById('advance-btn');
  if (advanceBtn) {
    advanceBtn.addEventListener('click', () => {
      buildGroupPlayoffs();
      state.currentStage = 'knockout';
      saveState();
      render();
    });
  }
  
  const resetBtn = document.getElementById('reset-btn');
  if (resetBtn) resetBtn.addEventListener('click', resetAll);
}

    phase: state.phase,

    groups: state.groups,

  };
}

function applyTournamentData(data) {
  if (!data) return;
  state.phase = data.phase || 'setup';
  state.format = data.format || 'group';
  state.playerCount = data.playerCount || 4;
  state.groupCount = data.groupCount || 2;
  state.players = data.players || [];
  state.groups = data.groups || [];
  state.matches = data.matches || [];
  state.knockoutRounds = data.knockoutRounds || [];
  state.finalMatch = data.finalMatch || null;
  state.semiMatches = data.semiMatches || [];
  state.currentStage = data.currentStage || 'group';
  state.drawing = false;
}

// 影像壓縮（報名/對戰共用）→ 約 200x200 JPEG
function compressImageFile(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const size = maxSize || 200;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const sw = Math.min(img.width, img.height);
        const sx = (img.width - sw) / 2;
        const sy = (img.height - sw) / 2;
        ctx.drawImage(img, sx, sy, sw, sw, 0, 0, size, size);
        resolve(canvas.toDataURL('image/jpeg', quality || 0.7));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

      <p class="signup-sub">等待主持人開賽中…</p>
      <div class="wait-dots"><span></span><span></span><span></span></div>
      <div class="wait-list-box">
        <p class="wait-list-title">目前已報名選手</p>
        <div id="wait-list" class="wait-list"></div>
      </div>
    </div>
  `;
  playersRef().on('value', (snap) => {
    const data = snap.val() || {};
    const arr = Object.values(data).sort((a,b)=> (a.ts||0)-(b.ts||0));
    const box = document.getElementById('wait-list');
    if (box) box.innerHTML = arr.map(p => `<div class="wait-chip"><img src="${p.photo}"><span>${escapeHtml(p.name)}</span></div>`).join('');
  });
  // 監聽開賽
  roomStatusRef().on('value', (snap) => {
    const status = snap.val();
    if (status && status !== 'signup') showPlayerTournamentView();
  });
}

function showPlayerTournamentView() {
  // 參賽者唯讀賽況：同步 tournament 後用既有 renderTournament
  roomRef.child('tournament').on('value', (snap) => {
    applyTournamentData(snap.val());
    const app = document.getElementById('app');
    if (state.phase === 'tournament') {
      app.innerHTML = '<div class="readonly-badge">👀 賽況（唯讀）</div>' + renderTournament();
      // 參賽者不綁定計分按鈕（唯讀）
      disableScoreButtons();
    } else {
      app.innerHTML = '<div class="signup-card"><p class="signup-sub">等待主持人開賽…</p></div>';
    }
  });
}

function disableScoreButtons() {
  document.querySelectorAll('.score-btn').forEach(b => b.disabled = true);
  document.querySelectorAll('.battle-btn').forEach(b => b.style.display = 'none');
}

// ---------- 投影模式 ----------
function renderScreenApp() {
  document.body.classList.add('screen-mode');
  const app = document.getElementById('app');
  // 同步比賽資料
  roomRef.child('tournament').on('value', (snap) => {
    applyTournamentData(snap.val());
    refreshScreen();
  });
  roomStatusRef().on('value', () => refreshScreen());
  playersRef().on('value', (snap) => {
    screenSignups = Object.values(snap.val() || {}).sort((a,b)=>(a.ts||0)-(b.ts||0));
    refreshScreen();
  });
  roomRef.child('screen').on('value', (snap) => {
    screenDirective = snap.val() || { view: 'auto' };
    refreshScreen();
  });
}
let screenSignups = [];
let screenDirective = { view: 'auto' };

function refreshScreen() {
  const app = document.getElementById('app');
  if (!app) return;
  roomStatusRef().once('value').then((snap) => {
    const status = snap.val() || 'signup';
    const view = (screenDirective && screenDirective.view) || 'auto';

    if (view === 'signups' || (view === 'auto' && status === 'signup')) {
      app.innerHTML = renderScreenSignups();
    } else if (view === 'champion') {
      // 冠軍畫面由 champion overlay 處理
      app.innerHTML = renderTournament();
    } else {
      app.innerHTML = renderTournament();
    }
  });
}

function renderScreenSignups() {
  return `
    <div class="screen-signups">
      <h2 class="screen-big-title">⚡ 報名中 ⚡</h2>
      <p class="screen-sub">掃描 QR Code 加入比賽</p>
      <div class="screen-count">已報名 <b>${screenSignups.length}</b> 位</div>
      <div class="screen-grid">
        ${screenSignups.map(p => `<div class="screen-player"><img src="${p.photo}"><span>${escapeHtml(p.name)}</span></div>`).join('')}
      </div>
    </div>
  `;
}

// ---------- 主持人控制台 ----------
function renderHostApp() {
  if (!hostAuthed()) { showHostLogin(); return; }
  document.body.classList.add('host-mode');
  startHostConsole();
}

function showHostLogin() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="signup-card">
      <h2 class="signup-title">🔐 主持人登入</h2>
      <p class="signup-sub">請輸入主持密碼</p>
      <input type="password" id="host-pw" class="signup-name-input" placeholder="密碼" />
      <button class="signup-btn" id="host-login-btn">進入控制台</button>
      <p class="signup-hint" id="host-hint"></p>
    </div>
  `;
  const tryLogin = () => {
    const pw = document.getElementById('host-pw').value;
    if (pw === HOST_PASSWORD) { setHostAuthed(); renderHostApp(); }
    else document.getElementById('host-hint').textContent = '密碼錯誤';
  };
  document.getElementById('host-login-btn').addEventListener('click', tryLogin);
  document.getElementById('host-pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
}

let hostSignups = [];
function startHostConsole() {
  // 同步報名名單與比賽資料
  playersRef().on('value', (snap) => {
    hostSignups = Object.values(snap.val() || {}).sort((a,b)=>(a.ts||0)-(b.ts||0));
    if (state.phase === 'setup') renderHostSignupPanel();
  });
  roomRef.child('tournament').on('value', (snap) => {
    if (snap.exists()) {
      applyTournamentData(snap.val());
      if (state.phase === 'tournament') renderHostTournament();
    }
  });
  roomStatusRef().once('value').then((snap) => {
    const status = snap.val();
    if (!status) roomStatusRef().set('signup');
    if (status === 'signup' || !status) renderHostSignupPanel();
  });
}

function renderHostSignupPanel() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="host-panel">
      <div class="host-bar">
        <span class="host-tag">主持控制台</span>
        <span class="host-screenlink">投影網址：在另一台開 <code>?screen=1</code></span>
      </div>
      <h2 class="host-h2">報名名單（${hostSignups.length}）</h2>
      <p class="signup-sub">參賽者掃碼陸續加入，名單即時更新</p>
      <div class="host-signup-grid" id="host-signup-grid">
        ${hostSignups.map(p => `
          <div class="host-signup-item">
            <img src="${p.photo}">
            <span>${escapeHtml(p.name)}</span>
            <button class="host-kick" data-id="${p.id}">移除</button>
          </div>`).join('') || '<p class="empty-hint">尚無人報名</p>'}
      </div>
      <div class="host-actions">
        <div class="host-format-row">
          <label>賽制：</label>
          <button class="hf-btn ${state.format==='group'?'on':''}" data-f="group">小組賽</button>
          <button class="hf-btn ${state.format==='knockout'?'on':''}" data-f="knockout">單淘汰</button>
        </div>
        <div class="host-format-row" id="host-group-row" style="${state.format==='group'?'':'display:none;'}">
          <label>組數：</label>
          ${[1,2,3,4].map(n=>`<button class="hg-btn ${state.groupCount===n?'on':''}" data-g="${n}">${n}組</button>`).join('')}
        </div>
        <button class="host-start-btn" id="host-start">🚩 截止報名 · 開始比賽</button>
        <button class="host-reset-btn" id="host-reset">重置整場（清空報名）</button>
      </div>
    </div>
  `;
  document.querySelectorAll('.host-kick').forEach(b => b.addEventListener('click', () => {
    if (confirm('移除這位選手？')) playersRef().child(b.dataset.id).remove();
  }));
  document.querySelectorAll('.hf-btn').forEach(b => b.addEventListener('click', () => {
    state.format = b.dataset.f;
    document.getElementById('host-group-row').style.display = state.format==='group'?'':'none';
    renderHostSignupPanel();
  }));
  document.querySelectorAll('.hg-btn').forEach(b => b.addEventListener('click', () => {
    state.groupCount = parseInt(b.dataset.g);
    renderHostSignupPanel();
  }));
  document.getElementById('host-start').addEventListener('click', hostStartTournament);
  document.getElementById('host-reset').addEventListener('click', () => {
    if (confirm('確定要重置整場比賽並清空所有報名嗎？')) {
      roomRef.child('tournament').remove();
      playersRef().remove();
      roomStatusRef().set('signup');
      state.phase = 'setup';
      setScreenView('signups');
    }
  });
  setScreenView('signups');
}

function hostStartTournament() {
  const minP = state.format === 'group' ? 3 : 2;
  if (hostSignups.length < minP) { alert('至少需要 ' + minP + ' 位選手'); return; }
  // 用報名者建立 players（保留照片到 playerPhotos）
  state.players = hostSignups.map((p, idx) => ({ id: idx, name: p.name }));
  state.playerCount = hostSignups.length;
  hostSignups.forEach((p, idx) => { setPlayerPhoto(idx, p.photo); });
  // 同步照片到 Firebase 供投影/參賽者顯示
  const photoMap = {};
  hostSignups.forEach((p, idx) => { photoMap[idx] = p.photo; });
  roomRef.child('photos').set(photoMap);

  const maxGroups = Math.min(4, Math.floor(state.playerCount / 2));
  if (state.format === 'group' && state.groupCount > maxGroups) state.groupCount = maxGroups;

  // 產生賽程
  if (state.format === 'group') {
    const { groups, matches } = generateGroups(state.players, state.groupCount);
    state.groups = groups;
    state.matches = matches;
    state.knockoutRounds = [];
    state.finalMatch = null;
    state.semiMatches = [];
    state.currentStage = 'group';
  } else {
    state.knockoutRounds = generateKnockout(state.players);
    state.groups = [];
    state.matches = [];
    state.finalMatch = null;
    state.semiMatches = [];
    state.currentStage = 'knockout';
  }
  state.phase = 'tournament';
  roomStatusRef().set('playing');
  pushTournament();
  setScreenView('tournament');
  renderHostTournament();
}

function renderHostTournament() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="host-bar">
      <span class="host-tag">主持控制台 · 比賽中</span>
      <div class="host-screen-controls">
        <span>投影：</span>
        <button class="screen-ctrl" data-v="tournament">賽況表</button>
        <button class="screen-ctrl" data-v="signups">報名牆</button>
      </div>
    </div>
    ${renderTournament()}
  `;
  attachTournamentHandlers();
  // 主持人計分後推送
  document.querySelectorAll('.screen-ctrl').forEach(b => b.addEventListener('click', () => {
    setScreenView(b.dataset.v);
  }));
}

// 包裝原本 render，讓主持人計分動作會 push 到 Firebase
const _originalRender = render;
render = function() {
  if (APP_ROLE === 'host' && hostAuthed() && state.phase === 'tournament') {
    renderHostTournament();
    pushTournament();
    return;
  }
  _originalRender();
};

// ===================== 啟動路由 =====================
function bootApp() {
  loadPhotos();
  const ok = initFirebase();
  if (!ok) {
    document.getElementById('app').innerHTML = '<div class="signup-card"><p class="signup-sub">無法連線，請檢查網路後重新整理</p></div>';
    return;
  }
  if (APP_ROLE === 'player') {
    renderPlayerApp();
  } else if (APP_ROLE === 'screen') {
    renderScreenApp();
  } else if (APP_ROLE === 'host') {
    renderHostApp();
  }
}

// 啟動
bootApp();
</script>
</body>
</html>
